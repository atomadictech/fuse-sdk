name: Publish to PyPI

# Triggered by pushing a v* tag (e.g. v0.1.0, v0.2.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token required.
#
# One-time PyPI configuration:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a pending publisher for atomadic-fuse with:
#        owner:    atomadictech
#        repo:     atomadic-fuse
#        workflow: publish.yml
#        environment: pypi
#   3. First successful run binds the publisher; subsequent releases
#      mint short-lived tokens automatically.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atomadic-fuse
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

name: Publish to PyPI

# Triggered by pushing a v* tag (e.g. v1.2.0).
# Publish via GitHub secret PYPI_API_TOKEN (twine-compatible API token).
# Optional: PyPI Trusted Publishing (OIDC) — configure at
#   https://pypi.org/manage/account/publishing/
#   owner=atomadictech, repo=fuse-sdk, workflow=publish.yml, environment=pypi
# If OIDC is configured, remove password line to use OIDC-only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atomadic-fuse
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
